<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SkillsAgents — Pixel Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#080a0f; --surface:#0d1117; --border:#1e2d3d;
      --cyan:#00f0ff; --purple:#7c3aed; --green:#10b981;
      --text:#e2e8f0; --muted:#64748b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* NAV */
    header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(8,10,15,.95);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
    .logo{font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px;}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:glow 2s infinite;}
    @keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .nav-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;}
    .nav-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    .nav-btn.active{background:rgba(0,240,255,.1);border-color:var(--cyan);color:var(--cyan);}
    .badge{padding:3px 8px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}

    /* LAYOUT */
    .workspace{flex:1;display:flex;overflow:hidden;}

    /* LEFT SIDEBAR */
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
    .online-badge{font-size:.65rem;background:rgba(16,185,129,.15);color:#10b981;padding:2px 7px;border-radius:10px;font-weight:700;}
    .agent-scroll{flex:1;overflow-y:auto;padding:6px;}
    .agent-item{padding:7px 10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:9px;margin-bottom:2px;transition:.15s;border:1px solid transparent;}
    .agent-item:hover{background:rgba(255,255,255,.04);}
    .agent-item.selected{background:rgba(0,240,255,.06);border-color:rgba(0,240,255,.2);}
    .agent-avatar{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
    .agent-meta{min-width:0;flex:1;}
    .agent-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .agent-role{font-size:.65rem;color:var(--muted);}
    .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .s-active{background:#10b981;box-shadow:0 0 5px #10b981;}
    .s-idle{background:var(--muted);}
    .s-think{background:#f59e0b;animation:glow .8s infinite;}
    .zone-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:10px 14px 4px;opacity:.7;}

    /* CANVAS AREA */
    .canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .toolbar{padding:7px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:rgba(13,17,23,.8);}
    .canvas-container{flex:1;overflow:auto;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;}
    #canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:default;}

    /* BOTTOM FEED */
    .feed{height:110px;flex-shrink:0;border-top:1px solid var(--border);background:rgba(13,17,23,.9);display:flex;flex-direction:column;overflow:hidden;}
    .feed-head{padding:6px 16px;border-bottom:1px solid var(--border);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:8px;}
    .feed-head::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0;}
    .feed-list{flex:1;overflow-y:auto;padding:4px 12px;}
    .feed-item{display:flex;align-items:baseline;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.72rem;line-height:1.5;}
    .feed-time{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.65rem;flex-shrink:0;}
    .feed-agent{font-weight:700;flex-shrink:0;}
    .feed-msg{color:var(--muted);}
    .feed-cmd{color:var(--cyan);font-family:'JetBrains Mono',monospace;}

    /* RIGHT PANEL */
    .detail{width:200px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:14px;gap:12px;overflow-y:auto;}
    .detail-name{font-size:.95rem;font-weight:800;letter-spacing:-.01em;}
    .detail-role{font-size:.72rem;color:var(--muted);margin-top:2px;}
    .state-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;font-size:.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;border:1px solid;}
    .section-head{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:4px;}
    .cmd-list{display:flex;flex-direction:column;gap:4px;}
    .cmd-tag{padding:4px 8px;border-radius:5px;background:rgba(0,240,255,.06);border:1px solid rgba(0,240,255,.15);color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:.7rem;cursor:pointer;transition:.15s;}
    .cmd-tag:hover{background:rgba(0,240,255,.12);}
    .divider{border:none;border-top:1px solid var(--border);}
    .token-bar-wrap{margin-top:2px;}
    .token-label{font-size:.65rem;color:var(--muted);display:flex;justify-content:space-between;}
    .token-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:4px;overflow:hidden;}
    .token-fill{height:100%;border-radius:2px;background:var(--green);transition:width .5s;}
    .scrollbar-thin::-webkit-scrollbar{width:3px;}
    .scrollbar-thin::-webkit-scrollbar-track{background:transparent;}
    .scrollbar-thin::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* NOTIFICATION TOAST */
    #toast{position:fixed;top:62px;right:16px;z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
    .toast-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.75rem;display:flex;gap:8px;align-items:center;animation:slideIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.4);}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>SkillsAgents <span style="font-weight:400;color:var(--muted);font-size:.82rem;">— Pixel Office</span></div>
  <div class="nav-right">
    <button class="nav-btn active" id="btnView" onclick="setTool('view')">👁 Visualizar</button>
    <button class="nav-btn" id="btnFollow" onclick="toggleFollow()">📍 Seguir agente</button>
    <button class="nav-btn" onclick="spawnNext()">⚡ Spawn</button>
    <button class="nav-btn" onclick="cycleSpeed()" id="btnSpeed">1× velocidade</button>
    <a href="/" class="nav-btn">← Voltar</a>
  </div>
</header>

<div class="workspace">

  <!-- LEFT: AGENT ROSTER -->
  <div class="sidebar">
    <div class="sidebar-head">
      Agentes
      <span class="online-badge" id="onlineCount">0 online</span>
    </div>
    <div class="agent-scroll scrollbar-thin" id="rosterList"></div>
  </div>

  <!-- CENTER: CANVAS + BOTTOM FEED -->
  <div class="canvas-wrap">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="canvas"></canvas>
    </div>
    <!-- COMMAND FEED -->
    <div class="feed">
      <div class="feed-head">Activity Feed</div>
      <div class="feed-list scrollbar-thin" id="feedList"></div>
    </div>
  </div>

  <!-- RIGHT: AGENT DETAIL -->
  <div class="detail scrollbar-thin" id="detailPanel">
    <div>
      <div class="detail-name" id="dName">@master</div>
      <div class="detail-role" id="dRole">Master Orchestrator</div>
    </div>
    <div class="state-pill" id="dState" style="color:#10b981;border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08);">
      <span id="dStateDot" style="width:6px;height:6px;border-radius:50%;background:#10b981;"></span>
      <span id="dStateLabel">TYPING</span>
    </div>
    <div class="token-bar-wrap">
      <div class="token-label"><span>Context</span><span id="dTokenPct">34%</span></div>
      <div class="token-bar"><div class="token-fill" id="dTokenFill" style="width:34%"></div></div>
    </div>
    <hr class="divider"/>
    <div class="section-head">Comandos</div>
    <div class="cmd-list" id="dCmds"></div>
    <hr class="divider"/>
    <div class="section-head">Última ação</div>
    <div id="dLastAction" style="font-size:.72rem;color:var(--muted);line-height:1.5;"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────
const TILE = 32, COLS = 24, ROWS = 16, BASE_ZOOM = 2;
let zoom = BASE_ZOOM, speed = 1, follow = false, selIdx = 0;

// ─── ZONES ───────────────────────────────────────────────────────
const ZONES = [
  { name:'DEV',     c1:0,  r1:0,  c2:7,  r2:8,  color:'rgba(0,240,255,0.035)' },
  { name:'DESIGN',  c1:8,  r1:0,  c2:15, r2:8,  color:'rgba(168,85,247,0.035)' },
  { name:'OPS',     c1:16, r1:0,  c2:23, r2:8,  color:'rgba(245,158,11,0.03)' },
  { name:'MASTER',  c1:9,  r1:4,  c2:15, r2:9,  color:'rgba(255,215,0,0.04)' },
  { name:'MEETING', c1:17, r1:9,  c2:23, r2:15, color:'rgba(16,185,129,0.04)' },
  { name:'CAFÉ',    c1:0,  r1:10, c2:6,  r2:15, color:'rgba(251,146,60,0.03)' },
];

// ─── DESK POSITIONS ───────────────────────────────────────────────
const DESKS = [
  // Dev zone
  {col:1,row:1}, {col:4,row:1}, {col:1,row:5}, {col:4,row:5},
  // Design zone
  {col:9,row:1}, {col:12,row:1}, {col:9,row:5},
  // Ops zone
  {col:17,row:1}, {col:20,row:1}, {col:17,row:5}, {col:20,row:5},
  // Master station (center)
  {col:11,row:6},
  // Extra
  {col:12,row:5},
];

// ─── AGENT DEFINITIONS ───────────────────────────────────────────
const AGENTS = [
  { id:'master',           name:'@master',     role:'Master Orchestrator', icon:'👑', color:'#FFD700', cmds:['*squad','*plan','*yolo','*swarm','*help'],    zone:'MASTER'  },
  { id:'dev',              name:'@dev',         role:'Developer',           icon:'💻', color:'#00f0ff', cmds:['*develop','*build','*run-tests','*waves'],    zone:'DEV'     },
  { id:'architect',        name:'@architect',   role:'Software Architect',  icon:'🏗️', color:'#818cf8', cmds:['*create-plan','*assess','*review'],          zone:'DEV'     },
  { id:'qa',               name:'@qa',          role:'Quality Assurance',   icon:'✅', color:'#10b981', cmds:['*review-build','*verify','*critique'],       zone:'OPS'     },
  { id:'devops',           name:'@devops',      role:'DevOps Engineer',     icon:'⚙️', color:'#f59e0b', cmds:['*deploy','*pipeline','*monitor'],            zone:'OPS'     },
  { id:'pm',               name:'@pm',          role:'Product Manager',     icon:'📋', color:'#f472b6', cmds:['*create-prd','*roadmap','*brief'],           zone:'DESIGN'  },
  { id:'ux-design-expert', name:'@ux',          role:'UX Design Expert',    icon:'🎨', color:'#fb923c', cmds:['*wireframe','*design','*audit'],             zone:'DESIGN'  },
  { id:'analyst',          name:'@analyst',     role:'Business Analyst',    icon:'🔍', color:'#a78bfa', cmds:['*create-brief','*research','*report'],       zone:'DESIGN'  },
  { id:'data-engineer',    name:'@data-eng',    role:'Data Engineer',       icon:'📊', color:'#34d399', cmds:['*pipeline','*model','*etl'],                zone:'OPS'     },
  { id:'sm',               name:'@sm',          role:'Scrum Master',        icon:'🔄', color:'#60a5fa', cmds:['*sprint','*standup','*retro'],               zone:'DESIGN'  },
  { id:'agent-coder',      name:'@coder',       role:'Code Implementer',    icon:'🔧', color:'#4ade80', cmds:['*implement','*refactor','*optimize'],        zone:'DEV'     },
  { id:'agent-reviewer',   name:'@reviewer',    role:'Code Reviewer',       icon:'🔎', color:'#c084fc', cmds:['*review','*approve'],                       zone:'DEV'     },
  { id:'hive-mind',        name:'@hive-mind',   role:'Hive Mind (BFT)',     icon:'🧩', color:'#f87171', cmds:['*consensus','*vote','*sync'],               zone:'OPS'     },
];

const STATES      = ['TYPING','IDLE','WALKING','THINKING','READING'];
const STATE_COLOR = { TYPING:'#10b981', IDLE:'#6b7280', WALKING:'#00f0ff', THINKING:'#f59e0b', READING:'#a78bfa' };

// ─── CODE SNIPPETS for monitors ────────────────────────────────
const CODE_LINES = [
  'const agent = new Agent("@master")',
  'await squad.execute(task)',
  'return response.data.result',
  'if (err) throw new AgentError(err)',
  'const { agents } = useSkillsAgents()',
  'await Promise.all(squad.map(run))',
  'db.query(SELECT * FROM agents)',
  'console.log("✔ deployed")',
  'git push origin main',
  'npm run build && npm test',
  '@master *squad create SaaS',
  'Use @react-patterns',
  'type Agent = { id: string }',
  'export default async handler',
  'CREATE INDEX ON skills USING hnsw',
  'docker build -t skillsagents .',
];

// ─── ACTIVITY MESSAGES ───────────────────────────────────────────
const ACTIVITIES = {
  TYPING:   a => [`executando`, `*${a.cmds[Math.floor(Math.random()*a.cmds.length)]}`],
  THINKING: a => [`analisando`, `contexto do projeto`],
  READING:  a => [`lendo`, `documentação @${['react-patterns','fastapi-pro','docker-expert'][Math.floor(Math.random()*3)]}`],
  WALKING:  a => [`movendo para`, `próxima tarefa`],
  IDLE:     a => [`aguardando`, `próximo comando`],
};

// ─── CHARACTER STATE ──────────────────────────────────────────────
const chars = AGENTS.map((def, i) => {
  const desk = DESKS[i % DESKS.length];
  return {
    ...def,
    x:     desk.col * TILE + TILE/2,
    y:     desk.row * TILE + TILE/2,
    tx:    desk.col * TILE + TILE/2,
    ty:    desk.row * TILE + TILE/2,
    deskX: desk.col * TILE,
    deskY: desk.row * TILE,
    state: i === 0 ? 'TYPING' : STATES[Math.floor(Math.random()*2)],
    frame: Math.floor(Math.random() * 120),
    active: i < 9,
    tokens: Math.floor(Math.random() * 60) + 10,
    codeOffset: Math.floor(Math.random() * CODE_LINES.length),
    lastAction: '',
  };
});

// ─── CANVAS SETUP ─────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
canvas.width  = COLS * TILE;
canvas.height = ROWS * TILE;
function applyZoom() {
  canvas.style.width  = (COLS * TILE * zoom) + 'px';
  canvas.style.height = (ROWS * TILE * zoom) + 'px';
}
applyZoom();

// ─── FLOOR DRAWING ────────────────────────────────────────────────
function drawFloor() {
  // Base tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#0c0f16' : '#0a0d14';
      ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
    }
  }
  // Zone overlays
  ZONES.forEach(z => {
    ctx.fillStyle = z.color;
    ctx.fillRect(z.c1*TILE, z.r1*TILE, (z.c2-z.c1+1)*TILE, (z.r2-z.r1+1)*TILE);
    // Zone label
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(z.name, ((z.c1+z.c2)/2+.5)*TILE, (z.r1+.7)*TILE);
    ctx.textAlign = 'left';
  });
  // Subtle grid
  ctx.strokeStyle = 'rgba(0,240,255,0.03)';
  ctx.lineWidth = .5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*TILE); ctx.lineTo(canvas.width, r*TILE); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*TILE, 0); ctx.lineTo(c*TILE, canvas.height); ctx.stroke();
  }
  // Meeting room border
  ctx.strokeStyle = 'rgba(16,185,129,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(17*TILE, 9*TILE, 7*TILE, 7*TILE);
  // Meeting table
  ctx.fillStyle = '#1a2030';
  ctx.fillRect(18*TILE+4, 10*TILE+4, 5*TILE-8, 4*TILE-8);
  ctx.strokeStyle = 'rgba(16,185,129,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(18*TILE+4, 10*TILE+4, 5*TILE-8, 4*TILE-8);
  // Café items
  drawCoffee(2*TILE+8, 11*TILE+4);
  // Plants
  drawPlant(0, 0);
  drawPlant((COLS-1)*TILE, 0);
  drawPlant(0, (ROWS-1)*TILE);
  drawPlant((COLS-1)*TILE, (ROWS-1)*TILE);
}

function drawCoffee(x, y) {
  // Machine body
  ctx.fillStyle = '#1e2535';
  ctx.fillRect(x, y, 22, 26);
  ctx.strokeStyle = 'rgba(251,146,60,.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, 22, 26);
  // Screen
  ctx.fillStyle = 'rgba(251,146,60,.2)';
  ctx.fillRect(x+3, y+3, 16, 8);
  // Steam
  const t = Date.now() / 300;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const sx = x + 6 + i*4;
    const wave = Math.sin(t + i) * 2;
    ctx.beginPath();
    ctx.moveTo(sx + wave, y - 2);
    ctx.bezierCurveTo(sx+wave+2, y-5, sx+wave-2, y-8, sx+wave, y-11);
    ctx.stroke();
  }
}

function drawPlant(x, y) {
  ctx.fillStyle = '#0d1a0d';
  ctx.fillRect(x+10, y+22, 12, 8);
  ctx.fillStyle = '#0a2a12';
  ctx.beginPath();
  ctx.ellipse(x+16, y+18, 8, 12, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#0d3a18';
  ctx.beginPath();
  ctx.ellipse(x+10, y+14, 6, 9, -0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x+22, y+14, 6, 9, 0.4, 0, Math.PI*2);
  ctx.fill();
}

// ─── DESK DRAWING ─────────────────────────────────────────────────
function drawDesk(x, y, char) {
  const occupied = !!char;
  const color = char?.color || '#555';

  // Desk body
  ctx.fillStyle = '#141924';
  ctx.fillRect(x+1, y+2, TILE-2, TILE-4);
  ctx.strokeStyle = occupied ? color + '33' : '#1e2533';
  ctx.lineWidth = 1;
  ctx.strokeRect(x+1, y+2, TILE-2, TILE-4);

  // Monitor frame
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(x+5, y+3, TILE-10, 14);
  // Monitor glow + content
  if (occupied) {
    ctx.fillStyle = color + '15';
    ctx.fillRect(x+5, y+3, TILE-10, 14);
    // Scrolling code lines
    const lineH = 2.5;
    const codeColor = color + 'cc';
    ctx.font = '2.5px monospace';
    ctx.fillStyle = codeColor;
    const offset = (char.frame * 0.04) % CODE_LINES.length;
    for (let i = 0; i < 4; i++) {
      const line = CODE_LINES[(Math.floor(offset + i + char.codeOffset)) % CODE_LINES.length];
      const opacity = i === 0 ? '99' : i === 3 ? '44' : 'bb';
      ctx.fillStyle = color + opacity;
      ctx.fillText(line.slice(0, 14), x+6, y+5+i*lineH);
    }
    // Cursor blink
    if (char.state === 'TYPING' && Math.floor(Date.now()/400) % 2 === 0) {
      ctx.fillStyle = color;
      ctx.fillRect(x+6, y+14, 1, 2);
    }
    // Glow around monitor
    const grd = ctx.createRadialGradient(x+TILE/2, y+10, 2, x+TILE/2, y+10, 18);
    grd.addColorStop(0, color + '18');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(x, y, TILE, 20);
  }
  // Monitor stand
  ctx.fillStyle = '#1a2030';
  ctx.fillRect(x+13, y+17, 6, 3);
  ctx.fillRect(x+10, y+19, 12, 2);
  // Keyboard
  ctx.fillStyle = '#1a2030';
  ctx.fillRect(x+5, y+24, TILE-10, 4);
  // Selected agent halo
  if (char && chars[selIdx]?.id === char.id) {
    ctx.strokeStyle = char.color + 'aa';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x+.5, y+.5, TILE-1, TILE-1);
  }
}

// ─── CHARACTER DRAWING ────────────────────────────────────────────
function drawChar(c, selected) {
  const x = c.x, y = c.y;
  const bob = c.state === 'IDLE' ? Math.sin(c.frame * 0.05) * 0.5 : 0;
  const isWalk = c.state === 'WALKING';
  const bodyH = 9;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(x, y+8, 7, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // Selection ring
  if (selected) {
    ctx.strokeStyle = c.color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([2,2]);
    ctx.beginPath();
    ctx.ellipse(x, y+6, 12, 6, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const yb = bob;
  // Body
  ctx.fillStyle = c.color + 'dd';
  ctx.fillRect(x-4, y-bodyH+yb, 8, bodyH);
  // Shirt detail
  ctx.fillStyle = c.color + '66';
  ctx.fillRect(x-2, y-bodyH+2+yb, 4, 3);

  // Head
  ctx.fillStyle = '#FDDBB5';
  ctx.fillRect(x-4, y-bodyH-7+yb, 8, 7);
  // Eyes
  const blink = (c.frame % 90 < 4) ? 0.5 : 1.5;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(x-3, y-bodyH-5+yb, 2, blink);
  ctx.fillRect(x+1, y-bodyH-5+yb, 2, blink);
  // Mouth
  if (c.state === 'TYPING' || c.state === 'THINKING') {
    ctx.fillStyle = '#c0706a';
    ctx.fillRect(x-1, y-bodyH-2+yb, 3, 1);
  }

  // Role accessory
  if (c.id === 'master') {
    // Crown pixel art
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(x-3, y-bodyH-10+yb, 2, 3);
    ctx.fillRect(x-1, y-bodyH-11+yb, 2, 4);
    ctx.fillRect(x+1, y-bodyH-10+yb, 2, 3);
  } else if (c.id === 'architect' || c.id === 'agent-reviewer') {
    // Glasses
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = .8;
    ctx.strokeRect(x-4, y-bodyH-6+yb, 3, 2);
    ctx.strokeRect(x+1, y-bodyH-6+yb, 3, 2);
    ctx.beginPath();
    ctx.moveTo(x-1, y-bodyH-5+yb);
    ctx.lineTo(x+1, y-bodyH-5+yb);
    ctx.stroke();
  } else if (c.id === 'devops' || c.id === 'hive-mind') {
    // Headset dot
    ctx.fillStyle = '#f59e0b';
    ctx.fillRect(x+3, y-bodyH-4+yb, 2, 4);
    ctx.fillRect(x+4, y-bodyH-5+yb, 1, 1);
  }

  // Arms
  ctx.fillStyle = c.color + 'cc';
  if (c.state === 'TYPING') {
    const aa = Math.sin(c.frame * 0.15) * 1.5;
    ctx.fillRect(x-7, y-bodyH+2+yb+aa, 3, 4);
    ctx.fillRect(x+4, y-bodyH+2+yb-aa, 3, 4);
  } else if (isWalk) {
    const aa = Math.sin(c.frame * 0.25) * 3;
    ctx.fillRect(x-7, y-bodyH+2+yb+aa, 3, 5);
    ctx.fillRect(x+4, y-bodyH+2+yb-aa, 3, 5);
  } else {
    ctx.fillRect(x-7, y-bodyH+3+yb, 3, 5);
    ctx.fillRect(x+4, y-bodyH+3+yb, 3, 5);
  }

  // Legs
  ctx.fillStyle = '#2a3045';
  if (isWalk) {
    const la = Math.sin(c.frame * 0.25) * 3;
    ctx.fillRect(x-3, y, 3, 5+la);
    ctx.fillRect(x+1, y, 3, 5-la);
  } else {
    ctx.fillRect(x-3, y, 3, 5);
    ctx.fillRect(x+1, y, 3, 5);
  }

  // Thinking bubble
  if (c.state === 'THINKING') {
    const bubbleAlpha = 0.5 + 0.5 * Math.sin(c.frame * 0.08);
    ctx.globalAlpha = bubbleAlpha;
    ctx.fillStyle = '#1e2535';
    ctx.fillRect(x+5, y-bodyH-17+yb, 22, 12);
    ctx.strokeStyle = c.color + '66';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+5, y-bodyH-17+yb, 22, 12);
    ctx.fillStyle = c.color;
    ctx.font = '6px monospace';
    ctx.fillText('...', x+10, y-bodyH-9+yb);
    ctx.globalAlpha = 1;
  }

  // Permission waiting bubble
  if (c.state === 'IDLE' && c.frame % 200 < 60) {
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#1e2535';
    ctx.fillRect(x+5, y-bodyH-17+yb, 28, 11);
    ctx.strokeStyle = '#f59e0b55';
    ctx.lineWidth = .8;
    ctx.strokeRect(x+5, y-bodyH-17+yb, 28, 11);
    ctx.fillStyle = '#f59e0b';
    ctx.font = '5px monospace';
    ctx.fillText('aguardando...', x+7, y-bodyH-10+yb);
    ctx.globalAlpha = 1;
  }
}

// ─── NAME BADGE ───────────────────────────────────────────────────
function drawBadge(c) {
  ctx.font = 'bold 5.5px monospace';
  const w = ctx.measureText(c.name).width + 6;
  const bx = c.x - w/2, by = c.y - 32;

  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(bx-1, by-6.5, w+2, 8);
  ctx.fillStyle = c.color;
  ctx.fillText(c.name, bx+2, by);

  const sc = STATE_COLOR[c.state] || '#6b7280';
  ctx.fillStyle = sc;
  ctx.beginPath();
  ctx.arc(bx+w-1, by-3, 2, 0, Math.PI*2);
  ctx.fill();
}

// ─── MASTER CONNECTION LINES ──────────────────────────────────────
function drawMasterLines() {
  if (chars[selIdx]?.id !== 'master') return;
  const master = chars[0];
  chars.forEach((c, i) => {
    if (!c.active || i === 0) return;
    ctx.strokeStyle = master.color + '22';
    ctx.lineWidth = .5;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.moveTo(master.x, master.y);
    ctx.lineTo(c.x, c.y);
    ctx.stroke();
    ctx.setLineDash([]);
  });
}

// ─── UPDATE ───────────────────────────────────────────────────────
function update() {
  chars.forEach(c => {
    if (!c.active) return;
    c.frame++;
    const dx = c.tx - c.x, dy = c.ty - c.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 1) {
      c.x += dx * 0.06 * speed;
      c.y += dy * 0.06 * speed;
      c.state = 'WALKING';
    } else {
      c.x = c.tx; c.y = c.ty;
      if (c.state === 'WALKING') {
        c.state = Math.random() < 0.6 ? 'TYPING' : 'IDLE';
        logActivity(c);
      }
    }
    const interval = Math.floor(180 / speed);
    if (dist <= 1 && c.frame % interval === 0) {
      const r = Math.random();
      if (r < 0.06) {
        const desk = DESKS[Math.floor(Math.random()*DESKS.length)];
        c.tx = desk.col*TILE + TILE/2;
        c.ty = desk.row*TILE + TILE/2;
      } else {
        const prev = c.state;
        c.state = r < 0.15 ? 'THINKING' : r < 0.25 ? 'IDLE' : r < 0.3 ? 'READING' : 'TYPING';
        if (c.state !== prev) logActivity(c);
      }
      c.tokens = Math.min(100, c.tokens + (Math.random() > 0.5 ? 5 : -3));
    }
  });
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawFloor();

  // Draw all desks
  DESKS.forEach((d, i) => {
    const owner = chars.find(c => c.active && Math.abs(c.tx - (d.col*TILE+TILE/2)) < 2 && Math.abs(c.ty - (d.row*TILE+TILE/2)) < 2);
    drawDesk(d.col*TILE, d.row*TILE, owner || null);
  });

  drawMasterLines();

  // Sort by y for z-order
  const active = chars.filter(c => c.active).sort((a,b) => a.y - b.y);
  active.forEach(c => {
    drawChar(c, c.id === chars[selIdx]?.id);
    drawBadge(c);
  });
}

// ─── ACTIVITY FEED ────────────────────────────────────────────────
const feedItems = [];
function logActivity(c) {
  const [verb, obj] = ACTIVITIES[c.state]?.(c) || ['trabalhando', ''];
  const entry = { time: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'}), agent: c, verb, obj };
  feedItems.unshift(entry);
  if (feedItems.length > 30) feedItems.pop();
  c.lastAction = `${verb} ${obj}`;
  renderFeed();
  if (c.id === chars[selIdx]?.id) updateDetail();
}

function renderFeed() {
  const el = document.getElementById('feedList');
  el.innerHTML = feedItems.slice(0,15).map(e => `
    <div class="feed-item">
      <span class="feed-time">${e.time}</span>
      <span class="feed-agent" style="color:${e.agent.color}">${e.agent.name}</span>
      <span class="feed-msg">${e.verb}</span>
      ${e.obj ? `<span class="feed-cmd">${e.obj}</span>` : ''}
    </div>`).join('');
}

// ─── ROSTER SIDEBAR ───────────────────────────────────────────────
function renderRoster() {
  const el = document.getElementById('rosterList');
  const activeCount = chars.filter(c => c.active).length;
  document.getElementById('onlineCount').textContent = activeCount + ' online';

  const groups = { DEV:[], DESIGN:[], OPS:[], MASTER:[] };
  chars.forEach((c, i) => groups[c.zone]?.push({ c, i }));

  el.innerHTML = Object.entries(groups).map(([zone, items]) =>
    items.length ? `
      <div class="zone-label">${zone}</div>
      ${items.map(({ c, i }) => `
        <div class="agent-item ${i === selIdx ? 'selected' : ''}" onclick="selectAgent(${i})">
          <div class="agent-avatar" style="background:${c.color}22;border:1px solid ${c.color}44">${c.icon}</div>
          <div class="agent-meta">
            <div class="agent-name" style="color:${c.active?c.color:var(--muted)}">${c.name}</div>
            <div class="agent-role">${c.role}</div>
          </div>
          <div class="status-dot ${!c.active ? 's-idle' : c.state==='THINKING' ? 's-think' : 's-active'}"></div>
        </div>`).join('')}` : ''
  ).join('');
}

// ─── DETAIL PANEL ─────────────────────────────────────────────────
function updateDetail() {
  const c = chars[selIdx];
  document.getElementById('dName').textContent = c.name;
  document.getElementById('dRole').textContent = c.role;
  const sc = STATE_COLOR[c.state] || '#6b7280';
  document.getElementById('dStateLabel').textContent = c.state;
  document.getElementById('dStateDot').style.background = sc;
  document.getElementById('dStateDot').style.boxShadow = `0 0 5px ${sc}`;
  document.getElementById('dState').style.color = sc;
  document.getElementById('dState').style.borderColor = sc + '44';
  document.getElementById('dState').style.background = sc + '11';
  const pct = Math.min(100, Math.max(5, c.tokens || 20));
  document.getElementById('dTokenPct').textContent = pct + '%';
  document.getElementById('dTokenFill').style.width = pct + '%';
  document.getElementById('dTokenFill').style.background = pct > 80 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#10b981';
  document.getElementById('dCmds').innerHTML = (c.cmds||[]).map(cmd =>
    `<div class="cmd-tag">${cmd}</div>`).join('');
  document.getElementById('dLastAction').textContent = c.lastAction || '—';
}

function selectAgent(i) {
  selIdx = i;
  renderRoster();
  updateDetail();
}

// ─── CONTROLS ─────────────────────────────────────────────────────
const speeds = [1,2,4,0.5];
let speedIdx = 0;
function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  speed = speeds[speedIdx];
  document.getElementById('btnSpeed').textContent = `${speed}× velocidade`;
}

let followMode = false;
function toggleFollow() {
  followMode = !followMode;
  document.getElementById('btnFollow').classList.toggle('active', followMode);
}

let spawnIdx = 9;
function spawnNext() {
  if (spawnIdx >= chars.length) return;
  chars[spawnIdx].active = true;
  chars[spawnIdx].x = canvas.width/2;
  chars[spawnIdx].y = -TILE;
  chars[spawnIdx].state = 'WALKING';
  spawnIdx++;
  renderRoster();
  showToast(`✨ ${chars[spawnIdx-1].name} entrou no escritório`, chars[spawnIdx-1].color);
}

function setTool(t) {
  canvas.style.cursor = t === 'edit' ? 'cell' : 'default';
}

// Click on canvas to select agent
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  chars.forEach((c, i) => {
    if (!c.active) return;
    if (Math.abs(c.x-mx) < 14 && Math.abs(c.y-my) < 18) selectAgent(i);
  });
});

// ─── TOAST NOTIFICATIONS ──────────────────────────────────────────
function showToast(msg, color = '#00f0ff') {
  const toast = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.style.borderColor = color + '44';
  el.innerHTML = `<span style="color:${color};font-size:.9rem">●</span> ${msg}`;
  toast.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── GAME LOOP ────────────────────────────────────────────────────
let lastRoster = 0;
function loop() {
  update();
  render();
  const now = Date.now();
  if (now - lastRoster > 1000) {
    renderRoster();
    updateDetail();
    lastRoster = now;
  }
  requestAnimationFrame(loop);
}

// ─── INIT ────────────────────────────────────────────────────────
renderRoster();
updateDetail();
loop();

// Initial activity burst
chars.filter(c => c.active).forEach((c, i) => {
  setTimeout(() => logActivity(c), i * 300);
});

// Periodic toast notifications
setInterval(() => {
  const active = chars.filter(c => c.active);
  const c = active[Math.floor(Math.random()*active.length)];
  const msgs = [
    `${c.name} completou uma tarefa`,
    `${c.name} está ${c.state === 'TYPING' ? 'codando' : c.state === 'THINKING' ? 'analisando' : 'em pausa'}`,
    `Nova ação de ${c.name}`,
  ];
  showToast(msgs[Math.floor(Math.random()*msgs.length)], c.color);
}, 12000);
</script>
