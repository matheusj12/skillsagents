<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AIOX Prompt Generator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --cyan: #00f0ff;
            --cyan-glow: rgba(0, 240, 255, 0.4);
            --bg: #09090b;
            --surface: #101216;
            --border: #2a2d3a;
            --muted: #8b949e;
            --text: #e6edf3;
            --terminal-bg: #010409;
            --terminal-header: #161b22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(14, 17, 23, .95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .logo span {
            color: var(--cyan);
        }

        .back {
            color: var(--cyan);
            text-decoration: none;
            font-size: .85rem;
            font-weight: 600;
        }

        .back:hover {
            text-decoration: underline;
        }

        .hero {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 900;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--cyan), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--muted);
            margin-bottom: 32px;
            font-size: 1.05rem;
        }

        .input-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .quick-prompt-btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--cyan);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: 0.2s;
        }

        .quick-prompt-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--cyan);
        }

        textarea {
            width: 100%;
            min-height: 140px;
            background: #0a0c10;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            color: var(--text);
            font-family: inherit;
            font-size: .95rem;
            resize: vertical;
            outline: none;
            transition: .2s;
            margin-bottom: 16px;
        }

        textarea:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .btn {
            background: var(--cyan);
            color: #0e1117;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            font-size: .95rem;
            cursor: pointer;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .btn:hover {
            opacity: .85;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(14, 17, 23, 0.3);
            border-top-color: #0e1117;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* TERMINAL RESULT AREA */
        .result-wrapper {
            display: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 240, 255, 0.05);
            margin-top: 30px;
        }

        .terminal-header {
            background: var(--terminal-header);
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mac-btns {
            display: flex;
            gap: 6px;
        }

        .mac-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .mac-close {
            background: #ff5f56;
        }

        .mac-min {
            background: #ffbd2e;
        }

        .mac-max {
            background: #27c93f;
        }

        .terminal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted);
            margin-left: 10px;
        }

        .result-box {
            background: var(--terminal-bg);
            padding: 32px;
            font-family: 'Inter', sans-serif;
        }

        .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 12px;
            color: var(--cyan);
            font-size: 1.2rem;
        }

        .markdown-body h3:first-child {
            margin-top: 0;
        }

        .markdown-body p {
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .markdown-body ul {
            margin-left: 20px;
            margin-bottom: 16px;
        }

        .markdown-body li {
            margin-bottom: 6px;
        }

        .markdown-body pre {
            background: #0a0c10;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 10px;
            overflow-x: auto;
            margin-bottom: 16px;
            position: relative;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: .85rem;
            color: #86efac;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: .75rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .error-msg {
            color: #fca5a5;
            background: rgba(239, 68, 68, .1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, .3);
            margin-top: 16px;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">👑 Orion <span>Command Center</span></div>
        <a class="back" href="/index.html">← Voltar ao Setup</a>
    </header>
    <div class="hero">
        <h1>Orquestração de Agentes <span>AIOX</span></h1>
        <p>Descreva o que você quer construir. O Orion (@aiox-master) vai analisar os 11 agentes e as 1.262 skills e
            delegar as tarefas criando um plano de ação completo.</p>

        <div class="input-box">
            <div class="quick-prompts">
                <button class="quick-prompt-btn"
                    onclick="fillPrompt('Quero criar um SaaS B2B com Next.js, FastAPI e Stripe para gestão de clínica veterinária.')">🚀
                    SaaS Next.js + FastAPI</button>
                <button class="quick-prompt-btn"
                    onclick="fillPrompt('Preciso de um App Mobile em React Native com painel Admin para delivery.')">📱
                    App Mobile + Admin</button>
                <button class="quick-prompt-btn"
                    onclick="fillPrompt('Crie um crawler de dados imobiliários focado em alta performance.')">🕷️ Web
                    Crawler</button>
            </div>
            <textarea id="ideaInput"
                placeholder="❯ Descreva seu projeto ou problema para o Orion resolver..."></textarea>
            <button class="btn" id="generateBtn" onclick="generatePrompt()">
                [🟢 Auto] Executar Orquestração
                <div class="spinner" id="spinner"></div>
            </button>
            <div id="errorMsg" class="error-msg"></div>
        </div>

        <div id="resultWrapper" class="result-wrapper">
            <div class="terminal-header">
                <div class="mac-btns">
                    <div class="mac-btn mac-close"></div>
                    <div class="mac-btn mac-min"></div>
                    <div class="mac-btn mac-max"></div>
                </div>
                <div class="terminal-title">orion@aiox-master: ~/orchestration</div>
            </div>
            <div id="resultBox" class="result-box">
                <div class="markdown-body" id="resultContent"></div>
            </div>
        </div>
    </div>

    <script>
        // Check for local storage history on load
        window.onload = () => {
            const savedIdea = localStorage.getItem('last_aiox_idea');
            const savedResult = localStorage.getItem('last_aiox_result');

            if (savedIdea) document.getElementById('ideaInput').value = savedIdea;
            if (savedResult) {
                const wrapper = document.getElementById('resultWrapper');
                document.getElementById('resultContent').innerHTML = savedResult;
                wrapper.style.display = 'block';
                addCopyButtons();
            }
        };

        function fillPrompt(text) {
            document.getElementById('ideaInput').value = text;
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((pre) => {
                if (pre.querySelector('.copy-btn')) return; // Already has button

                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copiar';
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.querySelector('code').innerText);
                    btn.innerText = 'Copiado!';
                    setTimeout(() => btn.innerText = 'Copiar', 2000);
                };
                pre.appendChild(btn);
            });
        }

        async function generatePrompt() {
            const input = document.getElementById('ideaInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const spinner = document.getElementById('spinner');
            const errBox = document.getElementById('errorMsg');
            const wrapper = document.getElementById('resultWrapper');
            const resultContent = document.getElementById('resultContent');

            if (!input) return;

            // Reset UI
            errBox.style.display = 'none';
            wrapper.style.display = 'none';
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea: input })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro desconhecido!');
                }

                // Render Markdown
                const renderedHtml = marked.parse(data.result);
                resultContent.innerHTML = renderedHtml;
                wrapper.style.display = 'block';

                // Save to history
                localStorage.setItem('last_aiox_idea', input);
                localStorage.setItem('last_aiox_result', renderedHtml);

                addCopyButtons();

            } catch (error) {
                errBox.innerText = '🤖 Erro: ' + error.message;
                errBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }
    </script>
</body>

</html>
